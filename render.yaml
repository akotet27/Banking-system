services:
  - type: web
    name: ishimwe-bank-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: ishimwe-bank-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-app.netlify.app  # ← replace with your Netlify URL
      - key: WEBAUTHN_RP_ID
        value: your-app.netlify.app          # ← replace (no https://)
      - key: WEBAUTHN_ORIGIN
        value: https://your-app.netlify.app  # ← replace with your Netlify URL
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false                  # Set manually in Render dashboard
      - key: SMTP_PASSWORD
        sync: false                  # Set manually in Render dashboard

databases:
  - name: ishimwe-bank-db
    databaseName: ishimwe_bank
    plan: free
